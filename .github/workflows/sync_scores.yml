name: Scheduled Score Sync

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Admin Sync
        shell: bash
        run: |
          curl -f -X POST "https://nhl-bracket-2026-production.up.railway.app/api/admin/update-official-results" \
          -H "X-Admin-Token: ${{ secrets.ADMIN_SYNC_TOKEN }}"
